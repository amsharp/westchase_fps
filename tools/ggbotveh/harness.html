<!DOCTYPE html>
<!-- Standalone comparison harness: current Meshy fleet cars vs GGBot pack
     conversions, decoded EXACTLY like game.js getVehGeo/getMeshyWheel.
     Serve the REPO ROOT (needs /three.min.js + /meshyvehs.js) and open
     /tools/ggbotveh/harness.html?shot=front|steer|close -->
<html>
<head><meta charset="utf-8"><style>body{margin:0;background:#222}</style></head>
<body>
<script src="/three.min.js"></script>
<script src="/meshyvehs.js"></script>
<script src="/tools/ggbotveh/out/ggbotvehs.js"></script>
<script>
var VEH_LEN = 4.64;
var renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(1280, 720);
document.body.appendChild(renderer.domElement);
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x9db8cc);
var camera = new THREE.PerspectiveCamera(50, 1280 / 720, 0.1, 200);
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
var sun = new THREE.DirectionalLight(0xfff4e0, 0.9);
sun.position.set(30, 50, 20); scene.add(sun);
var ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300),
  new THREE.MeshLambertMaterial({ color: 0x555a5e }));
ground.rotation.x = -Math.PI / 2; scene.add(ground);

function b64Bytes(s) {
  var bin = atob(s), a = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
  return a;
}
// exact copy of the game's decode contract
function decodeGeo(e, indexed) {
  var qp = new Int16Array(b64Bytes(e.p).buffer), qu = new Uint16Array(b64Bytes(e.u).buffer);
  var fp = new Float32Array(qp.length), fu = new Float32Array(qu.length);
  for (var i = 0; i < qp.length; i++) fp[i] = qp[i] / e.q;
  for (i = 0; i < qu.length; i += 2) { fu[i] = qu[i] / 8192; fu[i + 1] = 1 - qu[i + 1] / 8192; }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(fp, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(fu, 2));
  if (indexed && e.i) geo.setIndex(new THREE.BufferAttribute(new Uint16Array(b64Bytes(e.i).buffer), 1));
  geo.computeVertexNormals();
  return geo;
}
var pending = 0, alphaReport = [];
function texMat(e) {
  pending++;
  var im = new Image();
  var tx = new THREE.Texture(im);
  tx.magFilter = THREE.NearestFilter; tx.minFilter = THREE.NearestFilter; tx.generateMipmaps = false;
  im.onload = function () {
    tx.needsUpdate = true;
    var c = document.createElement('canvas'); c.width = im.width; c.height = im.height;
    var g = c.getContext('2d'); g.drawImage(im, 0, 0);
    var d = g.getImageData(0, 0, c.width, c.height).data, lo = 0;
    for (var i = 3; i < d.length; i += 4) if (d[i] < 250) lo++;
    alphaReport.push(e.n + ': ' + im.width + 'px, ' + lo + ' px alpha<250');
    pending--;
  };
  im.src = e.tex;
  return new THREE.MeshLambertMaterial({ map: tx });
}
function label(txt, x, z, y) {
  var c = document.createElement('canvas'); c.width = 256; c.height = 48;
  var g = c.getContext('2d');
  g.fillStyle = '#fff'; g.font = 'bold 30px monospace'; g.textAlign = 'center';
  g.strokeStyle = '#000'; g.lineWidth = 5;
  g.strokeText(txt, 128, 34); g.fillText(txt, 128, 34);
  var sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c) }));
  sp.scale.set(3.4, 0.64, 1); sp.position.set(x, y || 2.6, z);
  scene.add(sp);
}

var STEER = /steer|close/.test(location.search) ? 0.45 : 0;
var SPIN = /steer|close/.test(location.search) ? 0.9 : 0;

// ---- GGBot side: per-car extracted wheel mesh (wg) at true pivots,
// textured by the same car atlas material
function ggCar(name, x, z, ry) {
  var e = null;
  for (var i = 0; i < GGBOT_VEHS.length; i++) if (GGBOT_VEHS[i].n === name) e = GGBOT_VEHS[i];
  var s = VEH_LEN / e.dims[0];
  var grp = new THREE.Group();
  var mat = texMat(e);
  var body = new THREE.Mesh(decodeGeo(e), mat);
  body.scale.set(s, s, s);
  grp.add(body);
  var wgGeo = e.wg && decodeGeo(e.wg, true);
  (e.wheels || []).forEach(function (w) {
    if (!w || /nowheels/.test(location.search)) return;
    var pv = new THREE.Group();
    pv.position.set(w[0] * s, w[1] * s, w[2] * s);
    var wm = new THREE.Mesh(wgGeo, mat);
    wm.rotation.x = w[2] > 0 ? Math.PI / 2 : -Math.PI / 2; // axle local +Y -> car Z
    wm.scale.set(s, s, s);   // same unit space as the body
    wm.rotation.y = SPIN;                     // SPIN about the axle
    if (w[0] > 0) pv.rotation.y = STEER;      // STEER the front pivots
    pv.add(wm); grp.add(pv);
  });
  grp.position.set(x, 0, z); grp.rotation.y = ry || 0;
  scene.add(grp);
  label(name.replace('GG_', 'GG '), x, z);
  return grp;
}

// ---- Meshy side: body + shared MESHY_WHEEL using the game's tuned spots
var VEH_WHEEL_TUNE = { // copied from game.js (only models used here)
  SEDAN_MID: [1.27, 0.30, -1.35, 0.32, 0, 0, 1.3],
  MINIVAN: [1.52, 0.35, -1.56, 0.36, 0, 0, 1.3]
};
var WHEEL_BASE_W = 0.294;
var mwGeo = decodeGeo(MESHY_WHEEL, true);
var mwMat = texMat(MESHY_WHEEL);
function meshyCar(name, x, z, ry) {
  var vi = -1;
  for (var i = 0; i < MESHY_VEHS.length; i++) if (MESHY_VEHS[i].n === name) vi = i;
  var e = MESHY_VEHS[vi];
  var s = VEH_LEN / e.dims[0];
  var geo = decodeGeo(e);
  geo.rotateY(Math.PI); // VEH_FLIP (all Meshy models nose -x)
  var grp = new THREE.Group();
  var body = new THREE.Mesh(geo, texMat(e));
  body.scale.set(s, s, s);
  grp.add(body);
  var t = VEH_WHEEL_TUNE[name];
  e.wheels.forEach(function (w) {
    var front = -w[0] > 0;
    var wr = front ? t[1] : t[3];
    var halfW = WHEEL_BASE_W * (wr / 0.34) * t[6] / 2;
    var az = Math.abs(w[2]) * s + 0.04;
    var wz = az * (w[2] > 0 ? 1 : -1) * -1;
    var pv = new THREE.Group();
    pv.position.set(front ? t[0] : t[2], wr, wz);
    var wm = new THREE.Mesh(mwGeo, mwMat);
    wm.rotation.x = wz > 0 ? Math.PI / 2 : -Math.PI / 2;
    var ws = (0.68 / MESHY_WHEEL.dims[0]) * (wr / 0.34);
    wm.scale.set(ws, ws * t[6], ws);
    wm.rotation.y = SPIN;
    if (front) pv.rotation.y = STEER;
    pv.add(wm); grp.add(pv);
  });
  grp.position.set(x, 0, z); grp.rotation.y = ry || 0;
  scene.add(grp);
  label('MESHY ' + name, x, z);
  return grp;
}

var mode = (location.search.match(/shot=(\w+)/) || [])[1] || 'front';
var carq = (location.search.match(/car=(\w+)/) || [])[1] || 'GG_SALOON';
if (mode === 'close') {
  ggCar(carq, 0, 0, 0.5);
  camera.position.set(4.6, 1.7, 4.4); camera.lookAt(1.2, 0.7, 0);
} else {
  meshyCar('SEDAN_MID', -12.5, 0, 0);
  meshyCar('MINIVAN', -7.5, 0, 0);
  ggCar('GG_SALOON', -2.5, 0, 0);
  ggCar('GG_MINIVAN', 2.5, 0, 0);
  ggCar('GG_POLICE', 7.5, 0, 0);
  ggCar('GG_WAGON', 12.5, 0, 0);
  ggCar('GG_WRECK', 17.5, 0, 0);
  camera.position.set(3, 6.5, 17); camera.lookAt(2.5, 0.6, 0);
}

function frame() {
  renderer.render(scene, camera);
  if (pending > 0) requestAnimationFrame(frame);
  else { window.__ready = true; console.log(alphaReport.join(' | ')); renderer.render(scene, camera); }
}
frame();
</script>
</body>
</html>
